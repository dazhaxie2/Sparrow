server:
  port: 8083

spring:
  application:
    name: sparrow-ai
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${AI_KAFKA_GROUP:sparrow-ai}
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.sparrow.common.event
        spring.json.value.default.type: com.sparrow.common.event.GraphChangedEvent
    listener:
      missing-topics-fatal: false
  cloud:
    openfeign:
      client:
        config:
          chainModelConfigClient:
            connectTimeout: 2000
            readTimeout: 3000
            loggerLevel: none
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
      datasource:
        flow:
          nacos:
            server-addr: ${NACOS_ADDR:localhost:8848}
            data-id: ${SENTINEL_FLOW_DATA_ID:sparrow-ai-flow-rules}
            group-id: ${SENTINEL_GROUP:SENTINEL_GROUP}
            data-type: json
            rule-type: flow
  config:
    import:
      - optional:nacos:sparrow-common.yaml
      - optional:nacos:sparrow-ai.yaml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:sparrow_ai}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:sparrow}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

sparrow:
  model-pool:
    internal-token: ${SPARROW_MODEL_POOL_INTERNAL_TOKEN:}
  events:
    enabled: ${KAFKA_ENABLED:false}
  ai:
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    chat-model: ${AI_CHAT_MODEL:glm-4.5-air}
    embedding-model: ${AI_EMBEDDING_MODEL:embedding-3}
    free-quota-per-day: 3
    staging-schema: ${SPARROW_STAGING_SCHEMA:sparrow}
  milvus:
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    collection: tech_nodes

logging:
  level:
    com.sparrow: info
