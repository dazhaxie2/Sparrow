# Sparrow Redis 7 — Phase 3 tuning for 10k QPS 包络
# 注意:Redis 7 配置解析器不识别行尾 # 注释,所有注释必须独占一行。

# ── 内存 ──
# 图谱缓存 + 10k QPS 下更大 token 热集
maxmemory 1gb
maxmemory-policy allkeys-lru

# ── 网络 ──
# 10k QPS 下 SYN 积压余量
tcp-backlog 2048
tcp-keepalive 60
timeout 300

# ── 多线程 I/O(10k QPS 下降低单线程瓶颈)──
# io-threads 在高并发短连接/小包场景收益最大
io-threads 2
io-threads-do-reads yes

# ── 持久化(压测/开发关闭)──
save ""
appendonly no

# ── 慢日志 ──
slowlog-log-slower-than 10000
slowlog-max-len 256
