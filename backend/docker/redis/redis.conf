# Sparrow Redis 7 — Phase 3 tuning for 10k QPS 包络
# 注意:Redis 7 配置解析器不识别行尾 # 注释,所有注释必须独占一行。

# ── 内存 ──
# maxmemory 必须低于容器 limit(256M),否则 Redis 持续吃内存直到被 cgroup OOM kill。
# 留 ~56M 给 Redis 自身(对象元数据、客户端缓冲、AOF rewrite buffer 等)。
maxmemory 200mb
maxmemory-policy allkeys-lru

# ── 网络 ──
# 10k QPS 下 SYN 积压余量
tcp-backlog 2048
tcp-keepalive 60
timeout 300

# ── 多线程 I/O(10k QPS 下降低单线程瓶颈)──
# io-threads 在高并发短连接/小包场景收益最大
io-threads 2
io-threads-do-reads yes

# ── 持久化(压测/开发关闭)──
save ""
appendonly no

# ── 慢日志 ──
slowlog-log-slower-than 10000
slowlog-max-len 256
