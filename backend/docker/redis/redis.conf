# Sparrow Redis 7 — Phase 2 tuning for 1000 QPS

# ── 内存 ──
maxmemory 256mb                          # 图谱缓存 + token 存储,256MB 足够
maxmemory-policy allkeys-lru             # LRU 淘汰,优先保留热数据

# ── 持久化 ──
save ""                                  # 压测/开发环境关闭 RDB 快照
appendonly no                            # 关闭 AOF

# ── 网络 ──
tcp-keepalive 60
timeout 300

# ── 慢日志 ──
slowlog-log-slower-than 10000            # 记录 >10ms 的命令
slowlog-max-len 128
