server:
  port: 8081

spring:
  application:
    name: sparrow-user
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${USER_KAFKA_GROUP:sparrow-user}
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.sparrow.common.event
        spring.json.value.default.type: com.sparrow.common.event.OrderPaidEvent
    listener:
      missing-topics-fatal: false
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
  config:
    import:
      - optional:nacos:sparrow-common.yaml
      - optional:nacos:sparrow-user.yaml
  # Nacos 不可用时的本地默认值
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:sparrow_user}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:sparrow}
    password: ${MYSQL_PASSWORD:sparrow123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    # 邮箱验证码登录的发件邮箱(QQ SMTP)。
    # 授权码走 MAIL_PASSWORD 环境变量 / Nacos,不进 git。
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:3267044027@qq.com}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
          starttls:
            enable: false
        debug: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

sparrow:
  auth:
    token-ttl-days: 7
    # 非敏感的引导管理员身份；不会创建密码，只有注册/绑定该邮箱后才会生效。
    bootstrap-admin-email: ${SPARROW_ADMIN_EMAIL:13102373468@163.com}
  events:
    enabled: ${KAFKA_ENABLED:false}
  mail:
    # 验证码 TTL(分钟)与同一邮箱再次发送的冷却秒数
    code-ttl-minutes: ${MAIL_CODE_TTL_MINUTES:5}
    resend-cooldown-seconds: ${MAIL_RESEND_COOLDOWN_SECONDS:60}
    from-personal: ${MAIL_FROM_PERSONAL:Sparrow 科技图}

logging:
  level:
    com.sparrow: info

seata:
  enabled: ${SEATA_ENABLED:false}
  application-id: ${spring.application.name}
  tx-service-group: ${SEATA_TX_GROUP:sparrow_tx_group}
  registry:
    type: file
  config:
    type: file
  service:
    vgroup-mapping:
      sparrow_tx_group: ${SEATA_SERVICE_GROUP:default}
    grouplist:
      default: ${SEATA_SERVER:localhost:8091}
