server:
  port: 8080

spring:
  application:
    name: sparrow-gateway
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        file-extension: yaml
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:5173"
              - "http://localhost:4173"
              - "http://localhost:8080"
              # 生产域名(Cloudflare 终止 HTTPS 后以 http 回源,网关因 scheme 不一致会把同源 POST
              # 当跨域处理,故必须显式放行,否则登录/注册等 POST 预检被 CORS 拒成 403 空响应体)
              - "https://dazhaxie75.top"
              - "https://*.dazhaxie75.top"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: user
          uri: lb://sparrow-user
          predicates:
            - Path=/api/user/**
        - id: graph
          uri: lb://sparrow-graph
          predicates:
            - Path=/api/graph/**
        - id: ai
          uri: lb://sparrow-ai
          predicates:
            - Path=/api/ai/**
        - id: trade
          uri: lb://sparrow-trade
          predicates:
            - Path=/api/trade/**
        - id: trade-pay-mock
          uri: lb://sparrow-trade
          predicates:
            - Path=/api/pay/**
        - id: chain
          uri: lb://sparrow-industry-chain
          predicates:
            - Path=/api/chains/**
  config:
    import:
      - optional:nacos:sparrow-common.yaml
      - optional:nacos:sparrow-gateway.yaml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  web:
    resources:
      static-locations:
        - file:/app/static/
        - classpath:/static/

logging:
  level:
    com.sparrow: info
    org.springframework.cloud.gateway: info
