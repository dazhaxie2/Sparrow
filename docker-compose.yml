name: sparrow

# Phase 2 docker-compose:
# - M2 默认拆四个业务库:sparrow_user / sparrow_graph / sparrow_trade / sparrow_ai
# - 8081-8084 不 publish,只在 sparrow_net 内互访;唯一入口 = gateway:8080
# - Nacos 2.x gRPC 走 9848(8848+1000),宿主机访问 dashboard 需同时映射

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: sparrow
      MYSQL_USER: sparrow
      MYSQL_PASSWORD: sparrow123
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [sparrow_net]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [sparrow_net]

  nacos:
    image: nacos/nacos-server:v2.4.3
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    volumes:
      - nacos_data:/home/nacos/data
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/v1/console/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [sparrow_net]

  seata-server:
    image: apache/seata-server:2.1.0
    environment:
      SEATA_IP: seata-server
      SEATA_PORT: 8091
      STORE_MODE: file
    ports:
      - "7091:7091"
      - "8091:8091"
    depends_on:
      nacos: { condition: service_healthy }
    networks: [sparrow_net]

  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [sparrow_net]

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    profiles: ["ai"]
    networks: [sparrow_net]

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    profiles: ["ai"]
    networks: [sparrow_net]

  milvus:
    image: milvusdb/milvus:v2.4.15
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on: [etcd, minio]
    profiles: ["ai"]
    networks: [sparrow_net]

  # ===== 5 个业务服务 =====
  sparrow-gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: gateway-runtime
    environment:
      NACOS_ADDR: nacos:8848
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
    networks: [sparrow_net]

  sparrow-user:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: user-runtime
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_DB: sparrow_user
      REDIS_HOST: redis
      SEATA_ENABLED: "true"
      SEATA_SERVER: seata-server:8091
    expose: ["8081"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
      seata-server: { condition: service_started }
    networks: [sparrow_net]

  sparrow-graph:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: graph-runtime
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_DB: sparrow_graph
      REDIS_HOST: redis
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    expose: ["8082"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [sparrow_net]

  sparrow-trade:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: trade-runtime
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_DB: sparrow_trade
      SEATA_ENABLED: "true"
      SEATA_SERVER: seata-server:8091
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    expose: ["8084"]
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
      seata-server: { condition: service_started }
      kafka: { condition: service_healthy }
    networks: [sparrow_net]

  sparrow-ai:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: ai-runtime
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_DB: sparrow_ai
      REDIS_HOST: redis
      MILVUS_HOST: milvus
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-glm-4.5-air}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-embedding-3}
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    expose: ["8083"]
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
      kafka: { condition: service_healthy }
    profiles: ["ai"]
    networks: [sparrow_net]

networks:
  sparrow_net:

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
  nacos_data:
