<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparrow · 人类科技树</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
  <div class="brand">🐦 Sparrow <span class="sub">人类科技树</span></div>
  <div class="actions">
    <button id="btn-member" class="btn gold" hidden>👑 开通会员</button>
    <span id="user-info" class="user-info" hidden></span>
    <button id="btn-login" class="btn">登录 / 注册</button>
    <button id="btn-logout" class="btn ghost" hidden>退出</button>
  </div>
</header>

<main class="layout">
  <div id="chart"></div>

  <aside id="panel" class="panel">
    <div class="panel-placeholder">
      <h3>👋 欢迎来到人类科技树</h3>
      <p>从 50 万年前的「火」到未来的 AGI,共 77 项关键技术、110+ 条依赖关系。</p>
      <p>· 点击任意节点查看详情与前置技术链<br>· 拖拽平移、滚轮缩放<br>· 右下角召唤 AI 向导提问</p>
    </div>
  </aside>
</main>

<!-- AI 向导 -->
<div id="ai-dock" class="ai-dock collapsed">
  <div id="ai-toggle" class="ai-toggle">🤖 AI 向导</div>
  <div class="ai-body">
    <div id="ai-messages" class="ai-messages">
      <div class="msg bot">你好!我是科技树 AI 向导。试试问我:「蒸汽机的前置技术有哪些?」</div>
    </div>
    <div class="ai-input-row">
      <input id="ai-input" type="text" maxlength="500" placeholder="问点什么…">
      <button id="ai-send" class="btn">发送</button>
    </div>
  </div>
</div>

<!-- 登录注册 -->
<div id="modal-login" class="modal" hidden>
  <div class="modal-box">
    <h3>登录 Sparrow</h3>
    <input id="login-username" type="text" placeholder="用户名(3-32位)" maxlength="32">
    <input id="login-password" type="password" placeholder="密码(6-64位)" maxlength="64">
    <div class="modal-actions">
      <button id="btn-do-login" class="btn primary">登录</button>
      <button id="btn-do-register" class="btn">注册并登录</button>
      <button class="btn ghost modal-close">取消</button>
    </div>
  </div>
</div>

<!-- 会员购买 -->
<div id="modal-member" class="modal" hidden>
  <div class="modal-box">
    <h3>👑 开通 Sparrow 会员</h3>
    <p class="muted">解锁全部深度内容 + AI 向导无限次问答</p>
    <div class="products">
      <div class="product" data-code="MEMBER_MONTH">
        <div class="p-name">月度会员</div>
        <div class="p-price">¥9.90</div>
        <div class="p-days">30 天</div>
      </div>
      <div class="product" data-code="MEMBER_YEAR">
        <div class="p-name">年度会员</div>
        <div class="p-price">¥99.00</div>
        <div class="p-days">365 天</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost modal-close">再想想</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="/js/echarts.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
