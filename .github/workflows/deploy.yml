name: deploy

# CI/CD：push 到 main(或手动触发)→ 服务器上的 self-hosted runner 拉取最新代码、
# docker compose 重建并滚动重启。runner 主动外连 GitHub,无需服务器开放入站端口。
on:
  push:
    branches: [main]
    # 纯文档/工具改动不触发部署,省一次全量 build
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy_ai:
        description: "同时部署 AI 层(ai/milvus/etcd/minio/sentinel;16G 机器内存吃紧,仅在需要 AI 问答时勾选)"
        type: boolean
        default: false

# 同一时刻只跑一个部署,后到的排队(不取消正在进行的,避免半截重启)
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, windows]
    env:
      # 固定部署目录:.env 与具名卷(COMPOSE_PROJECT_NAME=sparrow)稳定,
      # 不用 actions/checkout 的临时 _work 目录(那会换项目名→换卷→丢数据)
      DEPLOY_DIR: C:\Users\hai\Desktop\Sparrow
    steps:
      - name: Sync repo to latest origin/main
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          git fetch --prune origin
          git reset --hard origin/main
          git log -1 --oneline

      # 路径检测:本次 push 是否触及 AI 相关代码。改了才在后续步骤重建 sparrow-ai,
      # 没改就跳过 —— 省 build 时间、避免 16G 机器重复构建大镜像压垮内存。
      # workflow_dispatch(手动触发)无 before/after,默认按"有改动"处理,交给原 Deploy AI tier 开关控制。
      - name: Detect AI changes
        id: detect
        shell: powershell
        run: |
          $before = '${{ github.event.before }}'
          $after  = '${{ github.event.after }}'
          $aiChanged = $false
          # before 为空或全零(首次推送/force-push/手动触发)→ 无法 diff,默认按有改动处理(宁可多重建也不漏)
          if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
            $aiChanged = $true
            Write-Host "无法获取 before 基线(手动触发/首次),默认需要重建 AI"
          } else {
            # ⚠ PowerShell 5.1(runner 默认)会把原生命令(git)的 stderr 当致命异常抛出,
            # 即使 2>$null 也不可靠(before commit 在本地不存在时 git 报错到 stderr → 脚本直接终止,
            # $LASTEXITCODE 兜底根本没机会跑)。用 cmd /c 包一层:stderr 合并到 stdout,
            # 让 PS 看到的只是普通文本输出,再用 $LASTEXITCODE 判断成败。
            $changed = $(cmd /c "git diff --name-only $before $after 2>&1")
            $rc = $LASTEXITCODE
            if ($rc -ne 0) {
              $aiChanged = $true
              Write-Host "git diff 失败(rc=$rc,常见原因:before 基线不在本地),默认需要重建 AI"
            } else {
              # AI 相关路径:服务本体、被依赖的 common 模块、父 POM、compose/env 配置
              $aiPaths = @('backend/sparrow-ai/', 'backend/sparrow-common/', 'backend/pom.xml', '.env.example', 'docker-compose.yml')
              foreach ($p in $changed) {
                foreach ($ap in $aiPaths) {
                  if ($p -like "$ap*") { $aiChanged = $true; break }
                }
                if ($aiChanged) { break }
              }
              Write-Host "本次变更文件:"
              $changed | ForEach-Object { Write-Host "  $_" }
            }
          }
          Write-Host "AI 相关改动: $aiChanged"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ai_changed=$aiChanged"

      - name: Architecture guard
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          docker run --rm -v "${PWD}:/repo" -w /repo/frontend node:20-alpine npm run guard:architecture

      - name: Build core images
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # AI 层是核心服务,已随核心栈默认构建(不再用 --profile ai 单独触发)
          docker compose build sparrow-gateway sparrow-user sparrow-graph sparrow-trade sparrow-industry-chain sparrow-ai

      - name: Deploy core stack (up -d)
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # AI 层(sparrow-ai/milvus/etcd/minio/sentinel)已从 profile 移出,随 up -d 默认全起;
          # spider/layout 仍在独立 profile,不随核心栈启动。
          docker compose up -d

      # 条件重建 AI 应用层:仅当检测到 AI 相关路径改动时才重建 sparrow-ai 单容器,
      # 避免每次部署都全量 build。AI 层已在核心栈 up -d 里启动,这里只做"代码变了就刷新"。
      # --no-deps 关键:只重建 sparrow-ai 自身,不动 milvus/etcd/minio 等重依赖(它们 rarely 变,重启慢且吃内存)。
      - name: Rebuild sparrow-ai if changed
        if: steps.detect.outputs.ai_changed == 'true'
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          Write-Host "检测到 AI 相关改动,重建 sparrow-ai..."
          docker compose build sparrow-ai
          # --no-deps 不重启依赖;--force-recreate 强制重建容器(compose 看镜像没变会跳过)
          docker compose up -d --no-deps --force-recreate sparrow-ai
          Write-Host "sparrow-ai 已重建"

      - name: Apply DB migrations (idempotent)
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # compose 的 init SQL 只在首次建卷执行;存量库靠 backend/scripts/migrate-*.sql
          # 幂等补齐新库/表/列(2026-06 图谱 schema 漂移、产业链缺库两次"系统繁忙"皆因漏迁移)。
          # 只跑 migrate-*.sql;seed-*.sql 是样例数据,不能在生产部署时执行。
          # 必须 docker cp + 容器内重定向:Get-Content|docker exec 管道会按控制台码页重编码,
          # 含中文的迁移(migrate-chain 的 4 条种子)会被压成 '?';docker cp 原样保字节。
          # 上一步 up -d 已因 depends_on service_healthy 等到 mysql 健康,此处可直接 exec。
          $mysql = (docker compose ps -q mysql | Select-Object -First 1)
          if (-not $mysql) { throw "mysql container not found" }
          Get-ChildItem "$env:DEPLOY_DIR\backend\scripts\migrate-*.sql" | Sort-Object Name | ForEach-Object {
            Write-Host "==> applying $($_.Name)"
            docker cp $_.FullName "${mysql}:/tmp/migrate.sql"
            docker exec $mysql sh -c "mysql -uroot -proot123 --default-character-set=utf8mb4 < /tmp/migrate.sql"
            if ($LASTEXITCODE -ne 0) { throw "migration $($_.Name) failed" }
          }
          Write-Host "All migrations applied."

      - name: Deploy AI tier (按需,仅 workflow_dispatch 勾选 deploy_ai)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ai }}
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # 显式带 --profile ai 构建并拉起 AI 层(与核心栈共存,内存吃紧,按需开启)
          docker compose --profile ai build sparrow-ai
          docker compose --profile ai up -d

      - name: Ensure restart policy (auto-recover on reboot)
        shell: powershell
        run: docker ps -aq | ForEach-Object { docker update --restart unless-stopped $_ }

      - name: Prune dangling images
        shell: powershell
        run: docker image prune -f

      - name: Health check (gateway :8080 + AI 注册 Nacos)
        shell: powershell
        run: |
          # 1) 等 gateway 进程在 8080 监听(4xx/5xx 也算进程存活)
          $deadline = (Get-Date).AddMinutes(8)
          $gatewayUp = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 5 http://localhost:8080/
              Write-Host "Gateway up: HTTP $($r.StatusCode)"
              $gatewayUp = $true
              break
            } catch [System.Net.WebException] {
              if ($null -ne $_.Exception.Response) {
                $code = [int]$_.Exception.Response.StatusCode
                Write-Host "Gateway responded HTTP $code (treated as up)"
                $gatewayUp = $true
                break
              }
              Write-Host "waiting for gateway... ($($_.Exception.Message))"
            } catch {
              Write-Host "waiting for gateway... ($($_.Exception.Message))"
            }
            Start-Sleep -Seconds 10
          }
          if (-not $gatewayUp) { Write-Host "Gateway health check timed out after 8 min"; exit 1 }

          # 2) 等 sparrow-ai 注册到 Nacos(AI 是核心服务,没注册 = 部署未完成)
          $aiDeadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $aiDeadline) {
            try {
              $resp = Invoke-WebRequest -UseBasicParsing -TimeoutSec 5 "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=sparrow-ai"
              $json = $resp.Content | ConvertFrom-Json
              $healthy = $json.hosts | Where-Object { $_.healthy -eq $true }
              if ($healthy) {
                Write-Host "sparrow-ai registered & healthy in Nacos"
                exit 0
              }
              Write-Host "sparrow-ai not yet healthy in Nacos, retrying..."
            } catch {
              Write-Host "Nacos query failed: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds 10
          }
          Write-Host "sparrow-ai did not register healthy in Nacos within 3 min after gateway up"
          exit 1
