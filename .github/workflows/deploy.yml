name: deploy

# CI/CD：push 到 main(或手动触发)→ 服务器上的 self-hosted runner 拉取最新代码、
# docker compose 重建并滚动重启。runner 主动外连 GitHub,无需服务器开放入站端口。
on:
  push:
    branches: [main]
    # 纯文档/工具改动不触发部署,省一次全量 build
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy_ai:
        description: "同时部署 AI 层(ai/milvus/etcd/minio/sentinel;16G 机器内存吃紧,仅在需要 AI 问答时勾选)"
        type: boolean
        default: false

# 同一时刻只跑一个部署,后到的排队(不取消正在进行的,避免半截重启)
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Prepare non-secret Compose validation environment
        run: cp .env.example .env
      - name: Validate changed scope
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
        run: node tools/harness.mjs changed --base "$BASE_SHA"
      - name: Full validation for manual deploy
        if: github.event_name == 'workflow_dispatch'
        run: node tools/harness.mjs full

  deploy:
    needs: verify
    runs-on: [self-hosted, windows]
    env:
      # 固定部署目录:.env 与具名卷(COMPOSE_PROJECT_NAME=sparrow)稳定,
      # 不用 actions/checkout 的临时 _work 目录(那会换项目名→换卷→丢数据)
      DEPLOY_DIR: C:\Users\hai\Desktop\Sparrow
      SPARROW_DEPLOY_SHA: ${{ github.sha }}
      SPARROW_PUBLIC_URL: https://dazhaxie75.top
    steps:
      - name: Sync repo to triggering commit
        shell: powershell
        run: |
          # ASCII-only: this runs in Windows PowerShell 5.1 on a zh-CN host.
          Set-Location $env:DEPLOY_DIR
          $expected = '${{ github.sha }}'
          $git = (Get-Command git.exe -ErrorAction Stop).Source

          function Invoke-GitChecked {
            param(
              [Parameter(Mandatory = $true)][string[]]$GitArgs,
              [int]$MaxAttempts = 1
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              $outFile = [System.IO.Path]::GetTempFileName()
              $errFile = [System.IO.Path]::GetTempFileName()
              try {
                $p = Start-Process -FilePath $git -ArgumentList $GitArgs `
                      -NoNewWindow -Wait -PassThru `
                      -RedirectStandardOutput $outFile -RedirectStandardError $errFile
                $stdout = Get-Content $outFile -Raw -ErrorAction SilentlyContinue
                $stderr = Get-Content $errFile -Raw -ErrorAction SilentlyContinue
                if ($stdout) { Write-Host $stdout.TrimEnd() }
                if ($p.ExitCode -eq 0) { return }
                $errorText = if ($stderr) { $stderr.Trim() } else { '<no stderr>' }
                Write-Warning "git $($GitArgs -join ' ') failed (attempt $attempt/$MaxAttempts, rc=$($p.ExitCode)): $errorText"
              } finally {
                Remove-Item $outFile, $errFile -ErrorAction SilentlyContinue
              }

              if ($attempt -lt $MaxAttempts) {
                # Exponential backoff capped at 60s: survives Mihomo restart windows
                # and GitHub-side transient outages that linear backoff could not.
                $delay = [Math]::Min(10 * [Math]::Pow(2, $attempt - 1), 60)
                Start-Sleep -Seconds $delay
              }
            }

            throw "git $($GitArgs -join ' ') failed after $MaxAttempts attempt(s)"
          }

          # Force-refresh the remote tracking ref. HTTP/1.1 avoids intermittent HTTP/2
          # connection resets observed on this Windows host.
          #
          # Route through the Mihomo HTTP proxy (mixed-port 7897) when it is up, so the
          # background runner service does not depend on TUN takeover of system traffic.
          # Fall back to direct/TUN when the proxy is down (e.g. Mihomo restarting), then
          # rely on the exponential backoff above to ride out the gap.
          $proxyPort = 7897
          $proxyUp = $false
          try {
            $probe = New-Object System.Net.Sockets.TcpClient
            $iar = $probe.BeginConnect('127.0.0.1', $proxyPort, $null, $null)
            $proxyUp = $iar.AsyncWaitHandle.WaitOne(800, $false) -and $probe.Connected
            $probe.Close()
          } catch { $proxyUp = $false }

          $fetchArgs = @('-c', 'http.version=HTTP/1.1')
          if ($proxyUp) {
            Write-Host "Mihomo proxy up on 127.0.0.1:$proxyPort; routing fetch via proxy."
            $fetchArgs += @(
              '-c', "http.proxy=http://127.0.0.1:$proxyPort",
              '-c', "https.proxy=http://127.0.0.1:$proxyPort"
            )
          } else {
            Write-Host "Mihomo proxy not listening on 127.0.0.1:$proxyPort; fetching direct/TUN."
          }
          $fetchArgs += @('fetch', '--no-tags', '--prune', 'origin',
                           '+refs/heads/main:refs/remotes/origin/main')

          Invoke-GitChecked -MaxAttempts 8 -GitArgs $fetchArgs
          Invoke-GitChecked -GitArgs @('cat-file', '-e', "$expected^{commit}")
          Invoke-GitChecked -GitArgs @('reset', '--hard', $expected)

          $actual = (& $git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $actual -ne $expected) {
            throw "deploy source mismatch: expected=$expected actual=$actual"
          }
          Write-Host "Deploy source verified: $actual"

      - name: Ensure Cloudflared tunnel self-healing
        shell: powershell
        run: |
          # Keep this block ASCII-only for Windows PowerShell 5.1 on the zh-CN host.
          Set-Location $env:DEPLOY_DIR
          & powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass `
            -File backend\scripts\install-cloudflared-watchdog.ps1
          if ($LASTEXITCODE -ne 0) {
            throw "Cloudflared watchdog installation failed (rc=$LASTEXITCODE)"
          }

      - name: Ensure Tailscale bypasses the Mihomo upstream
        shell: powershell
        run: |
          # Keep this block ASCII-only for Windows PowerShell 5.1 on the zh-CN host.
          Set-Location $env:DEPLOY_DIR
          & powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass `
            -File backend\scripts\install-host-network-resilience.ps1
          if ($LASTEXITCODE -ne 0) {
            throw "Host network resilience installation failed (rc=$LASTEXITCODE)"
          }

      # Path detection: did this push touch AI-related code? Rebuild sparrow-ai only if so,
      # otherwise skip - saves build time and avoids repeated large-image builds on a 16G machine.
      # workflow_dispatch (manual) has no before/after; defaults to "changed", gated by the Deploy AI tier toggle.
      - name: Detect AI changes
        id: detect
        shell: powershell
        run: |
          # NOTE: all log/comment text below is ASCII-only on purpose.
          # The self-hosted Windows runner defaults to PowerShell 5.1, which reads a BOM-less
          # .ps1 as the system ANSI codepage (GBK on zh-CN). UTF-8 CJK bytes get mis-decoded,
          # corrupting string terminators inside "..." and causing ParseException.
          # YAML-level fields (name/description/top-level # comments) are fine; only this
          # run block is fed to PS, so it must stay ASCII.
          $before = '${{ github.event.before }}'
          $after  = '${{ github.event.after }}'
          $aiChanged = $false
          if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
            $aiChanged = $true
            Write-Host "no before baseline (manual/first push), will rebuild AI"
          } else {
            # PS 5.1 treats a native command's non-zero exit as fatal even with 2>&1 / 2>$null,
            # so $() capture can abort before $LASTEXITCODE fallback runs. Start-Process redirects
            # stdout/stderr to files, keeping PS away from git's error stream entirely.
            $outFile = [System.IO.Path]::GetTempFileName()
            $errFile = [System.IO.Path]::GetTempFileName()
            try {
              $p = Start-Process -FilePath cmd.exe -ArgumentList "/c git diff --name-only $before $after" `
                    -NoNewWindow -Wait -PassThru `
                    -RedirectStandardOutput $outFile -RedirectStandardError $errFile
              $rc = $p.ExitCode
            } catch {
              $rc = 1
            }
            if ($rc -ne 0) {
              $aiChanged = $true
              Write-Host "git diff failed (rc=$rc, likely before baseline missing locally), will rebuild AI"
              Write-Host "stderr: $((Get-Content $errFile -Raw) -replace "`n",' ')"
            } else {
              $changed = Get-Content $outFile | Where-Object { $_.Trim() -ne '' }
              # AI-related paths: the service itself, the shared common module, parent POM, compose/env config
              $aiPaths = @('backend/sparrow-ai/', 'backend/sparrow-common/', 'backend/pom.xml', '.env.example', 'docker-compose.yml')
              foreach ($p in $changed) {
                foreach ($ap in $aiPaths) {
                  if ($p -like "$ap*") { $aiChanged = $true; break }
                }
                if ($aiChanged) { break }
              }
              Write-Host "changed files:"
              $changed | ForEach-Object { Write-Host "  $_" }
            }
            Remove-Item $outFile, $errFile -ErrorAction SilentlyContinue
          }
          Write-Host "AI changed: $aiChanged"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "ai_changed=$aiChanged"

      - name: Architecture guard
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          docker run --rm -v "${PWD}:/repo" -w /repo/frontend node:20-alpine npm run guard:architecture

      - name: Build core images
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # AI tier is core, built with the core stack (no separate --profile ai trigger)
          docker compose build sparrow-user sparrow-graph sparrow-trade sparrow-industry-chain sparrow-ai
          if ($LASTEXITCODE -ne 0) { throw "core image build failed" }
          # The gateway revision invalidates only npm run build and the final runtime layer.
          # Maven and npm dependency caches remain reusable across deploys.
          docker compose build sparrow-gateway
          if ($LASTEXITCODE -ne 0) { throw "gateway image build failed" }

      - name: Deploy core stack (up -d)
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # AI tier (sparrow-ai/milvus/etcd/minio/sentinel) starts with up -d by default;
          # spider/layout stay in their own profile and are not started here.
          docker compose up -d
          if ($LASTEXITCODE -ne 0) { throw "core stack deploy failed" }

      # Conditional AI app-tier rebuild: only when AI-related paths changed, rebuild the sparrow-ai container.
      # Avoids a full build on every deploy. The AI tier already started in the core up -d; this only refreshes when code changed.
      # --no-deps: rebuilds only sparrow-ai, leaves milvus/etcd/minio untouched (rarely change, slow & memory-heavy to restart).
      - name: Rebuild sparrow-ai if changed
        if: steps.detect.outputs.ai_changed == 'true'
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          Write-Host "AI changes detected, rebuilding sparrow-ai..."
          docker compose build sparrow-ai
          if ($LASTEXITCODE -ne 0) { throw "sparrow-ai image build failed" }
          # --no-deps keeps deps untouched; --force-recreate forces a new container
          docker compose up -d --no-deps --force-recreate sparrow-ai
          if ($LASTEXITCODE -ne 0) { throw "sparrow-ai recreate failed" }
          Write-Host "sparrow-ai rebuilt"

      - name: Ensure gateway image revision is active
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          $expected = '${{ github.sha }}'

          function Get-GatewayRevision {
            $containers = @(docker compose ps -q sparrow-gateway)
            $composeExit = $LASTEXITCODE
            $container = $containers | Select-Object -First 1
            if ($composeExit -ne 0 -or -not $container) { return '' }

            $revision = docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' $container
            if ($LASTEXITCODE -ne 0) { return '' }
            return (($revision | Out-String).Trim())
          }

          $actual = Get-GatewayRevision
          if ($actual -ne $expected) {
            Write-Warning "gateway revision mismatch after compose up: expected=$expected actual=$actual; recreating once"
            docker compose up -d --no-deps --force-recreate sparrow-gateway
            if ($LASTEXITCODE -ne 0) { throw "sparrow-gateway recreate failed" }
            $actual = Get-GatewayRevision
          }

          if ($actual -ne $expected) {
            throw "gateway revision mismatch after recovery: expected=$expected actual=$actual"
          }
          Write-Host "Gateway image revision verified: $actual"

      - name: Apply DB migrations (idempotent)
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # compose init SQL runs only on first volume creation; existing DBs are patched by
          # backend/scripts/migrate-*.sql (idempotent new DB/table/column adds).
          # Only migrate-*.sql runs; seed-*.sql is sample data, never on deploy.
          # docker cp + container-side redirect preserves bytes: Get-Content|docker exec re-encodes
          # by console codepage, turning CJK migration rows into '?'.
          # up -d above already waited for mysql healthy via depends_on service_healthy.
          $mysql = (docker compose ps -q mysql | Select-Object -First 1)
          if (-not $mysql) { throw "mysql container not found" }
          Get-ChildItem "$env:DEPLOY_DIR\backend\scripts\migrate-*.sql" | Sort-Object Name | ForEach-Object {
            Write-Host "==> applying $($_.Name)"
            docker cp $_.FullName "${mysql}:/tmp/migrate.sql"
            docker exec $mysql sh -c "mysql -uroot -proot123 --default-character-set=utf8mb4 < /tmp/migrate.sql"
            if ($LASTEXITCODE -ne 0) { throw "migration $($_.Name) failed" }
          }
          Write-Host "All migrations applied."

      - name: Deploy AI tier (optional, only when workflow_dispatch deploy_ai is checked)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_ai }}
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_DIR
          # build and start the AI tier with --profile ai alongside the core stack
          docker compose --profile ai build sparrow-ai
          if ($LASTEXITCODE -ne 0) { throw "optional AI image build failed" }
          docker compose --profile ai up -d
          if ($LASTEXITCODE -ne 0) { throw "optional AI tier deploy failed" }

      - name: Ensure restart policy (auto-recover on reboot)
        shell: powershell
        run: docker ps -aq | ForEach-Object { docker update --restart unless-stopped $_ }

      - name: Prune dangling images
        shell: powershell
        run: docker image prune -f

      - name: Health check (source + gateway + required services)
        shell: powershell
        run: |
          # 1) fail if another process changed the source during this deployment.
          Set-Location $env:DEPLOY_DIR
          $expected = '${{ github.sha }}'
          $actual = (git rev-parse HEAD).Trim()
          if ($LASTEXITCODE -ne 0 -or $actual -ne $expected) {
            Write-Host "Deploy source mismatch: expected=$expected actual=$actual"
            exit 1
          }
          Write-Host "Deploy source still verified: $actual"

          # Capture the native exit code before using a PowerShell pipeline. On Windows
          # PowerShell 5.1, piping docker output into Select-Object can leave LASTEXITCODE=-1
          # even when docker returned a valid container id.
          $industryContainers = @(docker compose ps -q sparrow-industry-chain)
          $composeExit = $LASTEXITCODE
          $industryContainer = $industryContainers | Select-Object -First 1
          if ($composeExit -ne 0 -or -not $industryContainer) {
            Write-Host "sparrow-industry-chain container not found"
            exit 1
          }
          $containerEnv = docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' $industryContainer
          if ($LASTEXITCODE -ne 0) {
            Write-Host "could not inspect sparrow-industry-chain container"
            exit 1
          }
          $shaEntry = $containerEnv | Where-Object { $_ -like 'SPARROW_DEPLOY_SHA=*' } | Select-Object -First 1
          $containerSha = if ($shaEntry) { $shaEntry.Substring('SPARROW_DEPLOY_SHA='.Length).Trim() } else { '' }
          if ($containerSha -ne $expected) {
            Write-Host "industry-chain container source mismatch: expected=$expected actual=$containerSha"
            exit 1
          }
          Write-Host "industry-chain container source verified: $containerSha"

          # 2) require both the built metadata and the HTML shell to expose this revision.
          # The public check catches stale CDN/tunnel routing that localhost cannot see.
          function Wait-FrontendRevision {
            param(
              [string]$BaseUrl,
              [string]$Name,
              [int]$TimeoutMinutes
            )

            $deadline = (Get-Date).AddMinutes($TimeoutMinutes)
            $attempt = 0
            while ((Get-Date) -lt $deadline) {
              $attempt++
              try {
                $base = $BaseUrl.TrimEnd('/')
                $headers = @{ 'Cache-Control' = 'no-cache'; 'Pragma' = 'no-cache' }
                $versionUrl = "$base/version.json?deploy=$expected&attempt=$attempt"
                $versionResponse = Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 -Headers $headers $versionUrl
                $metadata = $versionResponse.Content | ConvertFrom-Json
                $versionHeader = "$($versionResponse.Headers['X-Sparrow-Deploy-Sha'])".Trim()

                $shellResponse = Invoke-WebRequest -UseBasicParsing -TimeoutSec 10 -Headers $headers "$base/"
                $shellHeader = "$($shellResponse.Headers['X-Sparrow-Deploy-Sha'])".Trim()

                if ($metadata.sha -eq $expected -and
                    $versionHeader -eq $expected -and
                    $shellHeader -eq $expected) {
                  Write-Host "$Name frontend revision verified: $expected"
                  return $true
                }
                Write-Host "$Name frontend revision mismatch: metadata=$($metadata.sha) versionHeader=$versionHeader shellHeader=$shellHeader"
              } catch {
                Write-Host "$Name frontend revision check failed: $($_.Exception.Message)"
              }
              Start-Sleep -Seconds 10
            }
            return $false
          }

          if (-not (Wait-FrontendRevision -BaseUrl 'http://localhost:8080' -Name 'local' -TimeoutMinutes 8)) {
            Write-Host "Local gateway did not serve the expected frontend revision"
            exit 1
          }
          if (-not (Wait-FrontendRevision -BaseUrl $env:SPARROW_PUBLIC_URL -Name 'public' -TimeoutMinutes 3)) {
            Write-Host "Public endpoint did not serve the expected frontend revision"
            exit 1
          }

          # 3) require every user-facing AI/research service to register healthy in Nacos.
          function Wait-NacosService {
            param([string]$ServiceName, [int]$TimeoutMinutes = 3)
            $deadline = (Get-Date).AddMinutes($TimeoutMinutes)
            while ((Get-Date) -lt $deadline) {
              try {
                $url = "http://localhost:8848/nacos/v1/ns/instance/list?serviceName=$ServiceName"
                $resp = Invoke-WebRequest -UseBasicParsing -TimeoutSec 5 $url
                $json = $resp.Content | ConvertFrom-Json
                $healthy = $json.hosts | Where-Object { $_.healthy -eq $true }
                if ($healthy) {
                  Write-Host "$ServiceName registered & healthy in Nacos"
                  return $true
                }
                Write-Host "$ServiceName not yet healthy in Nacos, retrying..."
              } catch {
                Write-Host "Nacos query for $ServiceName failed: $($_.Exception.Message)"
              }
              Start-Sleep -Seconds 10
            }
            return $false
          }

          foreach ($service in @('sparrow-ai', 'sparrow-industry-chain')) {
            if (-not (Wait-NacosService -ServiceName $service)) {
              Write-Host "$service did not register healthy in Nacos within 3 min after gateway up"
              exit 1
            }
          }
