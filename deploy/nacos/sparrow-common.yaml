# sparrow-common.yaml —— 共享配置(所有 6 个服务都 import)
# Phase 3 抬升:HikariCP 30→50、Lettuce 50→100,支撑 10k QPS 包络。
# 单实例天花板:5 服务 ×50 = 250 连接 < MySQL max_connections=1500,余量充足。

spring:
  # 虚拟线程(JDK 21):Tomcat 请求线程、applicationTaskExecutor、@Async、StreamingResponseBody、
  # SseEmitter 外层自动切虚拟线程。SSE 长连接(AI 流式问答)收益最大——每个流占一个极轻量虚拟线程
  # 而非 Tomcat 平台线程,可支撑成百上千并发流。对 WebFlux 服务(gateway)无效(本就非阻塞),无副作用。
  threads:
    virtual:
      enabled: true
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:50}
      minimum-idle: ${HIKARI_MIN_IDLE:20}
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
  data:
    redis:
      lettuce:
        pool:
          max-active: ${LETTUCE_MAX_ACTIVE:100}
          max-idle: 40
          min-idle: 20
          max-wait: 3000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.sparrow: info
    org.springframework.cloud.openfeign: info

seata:
  enabled: ${SEATA_ENABLED:false}
  application-id: ${spring.application.name}
  tx-service-group: ${SEATA_TX_GROUP:sparrow_tx_group}
  registry:
    type: file
  config:
    type: file
  service:
    vgroup-mapping:
      sparrow_tx_group: ${SEATA_SERVICE_GROUP:default}
    grouplist:
      default: ${SEATA_SERVER:localhost:8091}
