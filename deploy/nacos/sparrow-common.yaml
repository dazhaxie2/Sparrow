# sparrow-common.yaml —— 共享配置(所有 5 个服务都 import)

spring:
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:30}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
  data:
    redis:
      lettuce:
        pool:
          max-active: ${LETTUCE_MAX_ACTIVE:50}
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.sparrow: info
    org.springframework.cloud.openfeign: info

seata:
  enabled: ${SEATA_ENABLED:false}
  application-id: ${spring.application.name}
  tx-service-group: ${SEATA_TX_GROUP:sparrow_tx_group}
  registry:
    type: file
  config:
    type: file
  service:
    vgroup-mapping:
      sparrow_tx_group: ${SEATA_SERVICE_GROUP:default}
    grouplist:
      default: ${SEATA_SERVER:localhost:8091}
